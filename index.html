<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HORIMIYA CREATOR ANIME</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0a001a, #000);
  color: white;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* PARTICLE */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* LOGO */
.logo {
  text-align: center;
  font-size: 32px;
  margin-top: 30px;
  font-weight: bold;
  background: linear-gradient(45deg, #a020f0, #00f0ff);
  -webkit-background-clip: text;
  color: transparent;
  text-shadow: 0 0 20px rgba(160,32,240,0.8);
}

/* MAIN WRAP */
.main {
  flex: 1;
}

/* CARD */
.container {
  margin: 40px auto;
  width: 90%;
  max-width: 400px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 40px rgba(160,32,240,0.8);
  backdrop-filter: blur(15px);
  text-align: center;
}

/* INPUT */
input, textarea {
  width: 90%;
  margin: 10px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
}

/* BUTTON */
button {
  padding: 12px 25px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg, purple, blue);
  color: white;
  cursor: pointer;
  box-shadow: 0 0 15px purple;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px cyan;
}

/* STEP */
.step {
  margin-top: 10px;
  font-size: 14px;
  color: #ccc;
}

#nextBtn {
  display: none;
  margin-top: 20px;
  background: linear-gradient(45deg, #00f0ff, #a020f0);
}

/* DIVIDER */
.divider {
  margin: 50px 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, #a020f0, #00f0ff, transparent);
}

/* SECTION */
.section {
  text-align: center;
  padding: 30px 20px;
}

/* FLEX */
.flex {
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
}

/* CARD MINI */
.card-mini {
  background: rgba(255,255,255,0.05);
  padding: 12px;
  border-radius: 12px;
  width: 120px;
}

/* FOOTER */
.footer {
  padding: 20px;
  text-align: center;
  font-size: 14px;
  color: #aaa;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="main">

<div class="logo">HCA SELEKSI</div>

<div class="container">

<div class="step">..</div>

<form id="form">
<input type="text" id="nama" placeholder="Nama" required>
<input type="number" id="umur" placeholder="Umur" required>
<textarea id="alasan" placeholder="Alasan Gabung" required></textarea>

<button type="submit">Register</button>
</form>

<div class="step" id="." style="display:none;">Step 2: Masuk Grup</div>
<button id="nextBtn">Masuk Grup Seleksi</button>

</div>

<div class="divider"></div>

<div class="section">
  <h2 style="text-shadow:0 0 10px purple;">Kenapa Join?</h2>
  <p>🔥 Komunitas kreator anime aktif</p>
  <p>🎬 Collab edit bareng</p>
  <p>🚀 Support & feedback biar skill naik</p>
</div>

<div class="section">
  <h2 style="text-shadow:0 0 10px cyan;">ADMIN</h2>
  <div class="flex">
    <div class="card-mini">
      <p>Owner</p>
      <small>Monzy</small>
    </div>
    <div class="card-mini">
      <p>Owner</p>
      <small>Reiiko</small>
    </div>
</div>

</div>

<div class="footer">
  © 2026 Horimiya creator anime • All Rights Reserved  
  <br>
  <span style="color:#a020f0;">Anime Creator System</span>
</div>

<script>
/* PARTICLE */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let particles = [];
for(let i=0;i<80;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    d: Math.random()*1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "rgba(160,32,240,0.8)";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });
  update();
}

function update(){
  particles.forEach(p=>{
    p.y += p.d;
    if(p.y > canvas.height){
      p.y = 0;
      p.x = Math.random()*canvas.width;
    }
  });
}
setInterval(draw, 30);

/* FORM */
const form = document.getElementById("form");
const nextBtn = document.getElementById("nextBtn");
const step2 = document.getElementById("step2");

form.addEventListener("submit", function(e){
  e.preventDefault();

  let data = {
    nama: document.getElementById("nama").value,
    umur: document.getElementById("umur").value,
    alasan: document.getElementById("alasan").value
  };

  localStorage.setItem("pendaftar", JSON.stringify(data));

  form.style.display = "none";
  nextBtn.style.display = "inline-block";
  step2.style.display = "block";
});

nextBtn.addEventListener("click", function(){
  window.location.href = "https://chat.whatsapp.com/EJXvKsRiG8s9t2RE3I3E6f";
});
</script>

</body>
</html>
